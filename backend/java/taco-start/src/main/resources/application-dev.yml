server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/taco_dev?useUnicode=true&characterEncoding=utf8
    username: postgres
    password: postgres

# 开发环境启用详细日志
logging:
  level:
    com.taco: DEBUG
    org.springframework.web: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl